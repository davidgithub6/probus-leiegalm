name: Deploy Frontend to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.*'
      - 'package.json'
      - 'wrangler.toml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CMS_URL: https://probus-cms.david-develops.workers.dev

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
